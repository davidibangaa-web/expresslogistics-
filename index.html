<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Logistics</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0a1a3a, #0f2a5c);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px;
}

.header h1 {
    font-size: 32px;
}

/* TRACK BOX */
.track-box {
    display: flex;
    justify-content: center;
    margin: 20px;
}

input {
    padding: 15px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 15px 20px;
    margin-left: 10px;
    border: none;
    border-radius: 10px;
    background: #2ecc71;
    color: white;
    cursor: pointer;
}

/* RESULT */
.result {
    text-align: center;
    margin-top: 20px;
}

/* TIMELINE */
.timeline {
    max-width: 600px;
    margin: 40px auto;
    position: relative;
    padding-left: 30px;
}

.timeline::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 0;
    width: 3px;
    height: 100%;
    background: #aaa;
}

.event {
    margin-bottom: 30px;
    position: relative;
}

.event::before {
    content: "";
    position: absolute;
    left: -22px;
    top: 5px;
    width: 12px;
    height: 12px;
    background: #3498db;
    border-radius: 50%;
}

.event h3 {
    margin: 0;
    color: #4da3ff;
}

.event p {
    margin: 5px 0;
    color: #ccc;
}

/* CONTACT */
.contact {
    text-align: center;
    margin: 40px;
}

.contact a {
    color: #2ecc71;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="header">
    <h1>🚚 Express Logistics</h1>
    <p>Track Your Package in Real-Time</p>
</div>

<div class="track-box">
    <input type="text" id="trackId" placeholder="Enter Tracking ID">
    <button onclick="track()">Track</button>
</div>

<div class="result" id="result"></div>

<div class="timeline" id="timeline"></div>

<div class="contact">
    Contact us on Telegram 👉 
    <a href="https://t.me/privatedeliveryagent001" target="_blank">
        Click Here
    </a>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com/",
    projectId: "express-logistics-793a0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.track = function () {
    const id = document.getElementById("trackId").value;
    const shipmentRef = ref(db, "shipments/" + id);

    get(shipmentRef).then((snapshot) => {
        const timelineDiv = document.getElementById("timeline");
        const resultDiv = document.getElementById("result");

        timelineDiv.innerHTML = "";

        if (snapshot.exists()) {
            const data = snapshot.val();
            resultDiv.innerHTML = "✅ Status: " + data.status;

            if (data.history) {
                data.history.reverse().forEach(item => {
                    timelineDiv.innerHTML += `
                        <div class="event">
                            <h3>${item.title}</h3>
                            <p>${item.location}</p>
                            <p>${item.date}</p>
                        </div>
                    `;
                });
            }
        } else {
            resultDiv.innerHTML = "❌ Tracking ID not found";
        }
    });
};
</script>

</body>
</html>
