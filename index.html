<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Logistics</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.subtitle {
  color: #ccc;
  margin-bottom: 30px;
}

input {
  padding: 15px;
  width: 60%;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  margin-left: 10px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.timeline {
  max-width: 500px;
  margin: 40px auto;
  text-align: left;
}

.timeline-item {
  border-left: 3px solid #22c55e;
  padding: 10px 20px;
  margin: 20px 0;
  position: relative;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -8px;
  top: 15px;
  width: 15px;
  height: 15px;
  background: #22c55e;
  border-radius: 50%;
}

.status {
  font-weight: bold;
}

.contact {
  margin-top: 40px;
}

a {
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚚 Express Logistics</h1>
  <p class="subtitle">Track Your Package in Real-Time</p>

  <input id="trackingInput" placeholder="Enter Tracking ID">
  <button onclick="trackPackage()">Track</button>

  <div id="timeline" class="timeline"></div>

  <div class="contact">
    <p>Contact us on Telegram:</p>
    <a href="https://t.me/privatedeliveryagent001" target="_blank">
      https://t.me/privatedeliveryagent001
    </a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCCeOgVmgMbF2KS2HF68hbqaO_-XDLn6A",
  authDomain: "express-logistics-793a0.firebaseapp.com",
  databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com",
  projectId: "express-logistics-793a0",
  storageBucket: "express-logistics-793a0.firebasestorage.app",
  messagingSenderId: "405295804716",
  appId: "1:405295804716:web:2ee889cab8a3cca4dd3c89",
  measurementId: "G-YSGJPBK6Z1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function trackPackage() {
  const id = document.getElementById("trackingInput").value.trim();

  db.ref("shipments/" + id + "/updates").once("value", snapshot => {
    const updates = snapshot.val();

    if (updates) {
      let html = "";

      Object.values(updates).reverse().forEach(update => {
        html += `
          <div class="timeline-item">
            <div class="status">${update.status}</div>
            <div>${update.location}</div>
            <small>${update.date}</small>
          </div>
        `;
      });

      document.getElementById("timeline").innerHTML = html;
    } else {
      document.getElementById("timeline").innerHTML =
        "<p style='color:red;'>❌ Tracking ID not found</p>";
    }
  });
}
</script>

</body>
</html>
