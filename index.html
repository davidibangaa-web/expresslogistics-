<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Logistics</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #0a1a3a, #1a3c7a);
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
}

.header h1 {
  font-size: 32px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h2 {
  font-size: 24px;
  margin-bottom: 20px;
  color: #ccc;
}

/* INPUT */
.track-box {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.track-box input {
  padding: 15px;
  width: 300px;
  border-radius: 10px;
  border: none;
}

.track-box button {
  padding: 15px 25px;
  background: #28a745;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* RESULT CARD */
.result-card {
  margin: 30px auto;
  width: 90%;
  max-width: 500px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  display: none;
}

/* PROGRESS BAR */
.progress-bar {
  height: 8px;
  background: #444;
  border-radius: 10px;
  margin: 20px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #28a745;
  transition: 0.5s;
}

/* TIMELINE */
.timeline {
  text-align: left;
  margin-top: 15px;
}

.timeline p {
  margin: 5px 0;
  font-size: 14px;
}

/* TELEGRAM BUTTON */
.contact {
  text-align: center;
  margin: 40px 0;
}

.contact a {
  background: #0088cc;
  padding: 15px 25px;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="header">
  🚚 <h1>Express Logistics</h1>
</div>

<div class="hero">
  <h2>Track Your Package in Real-Time</h2>

  <div class="track-box">
    <input id="trackId" placeholder="Enter Tracking ID">
    <button onclick="track()">Track</button>
  </div>
</div>

<!-- RESULT -->
<div class="result-card" id="card">
  <h3 id="status"></h3>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="timeline">
    <p id="location"></p>
    <p id="date"></p>
  </div>
</div>

<!-- CONTACT -->
<div class="contact">
  <a href="https://t.me/privatedeliveryagent001" target="_blank">
    💬 Contact us on Telegram
  </a>
</div>

<div class="footer">
  © 2026 Express Logistics. All rights reserved.
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "express-logistics-793a0.firebaseapp.com",
  databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com",
  projectId: "express-logistics-793a0",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.track = function () {
  const id = document.getElementById("trackId").value;
  const shipmentRef = ref(db, "shipments/" + id);

  get(shipmentRef).then((snap) => {
    if (snap.exists()) {
      const data = snap.val();

      document.getElementById("card").style.display = "block";
      document.getElementById("status").innerHTML = "📦 " + data.status;
      document.getElementById("location").innerHTML = "📍 " + data.location;
      document.getElementById("date").innerHTML = "📅 " + data.date;

      updateProgress(data.status);

    } else {
      alert("Tracking ID not found");
    }
  });
};

function updateProgress(status) {
  let progress = 0;

  if (status === "Processed") progress = 25;
  if (status === "Shipped") progress = 50;
  if (status === "In transit") progress = 75;
  if (status === "Delivered") progress = 100;

  document.getElementById("progress").style.width = progress + "%";
}
</script>

</body>
</html>
