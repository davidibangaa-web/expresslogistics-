<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Logistics</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
}

header {
  background: #0f172a;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.hero {
  text-align: center;
  padding: 50px 20px;
  background: linear-gradient(135deg, #0ea5e9, #1e293b);
}

.track-box {
  padding: 20px;
  text-align: center;
}

input {
  padding: 12px;
  width: 80%;
  border-radius: 6px;
  border: none;
}

button {
  padding: 12px;
  margin-top: 10px;
  background: #38bdf8;
  border: none;
  color: white;
  border-radius: 6px;
}

.status {
  margin: 20px;
  padding: 20px;
  background: #111827;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<header>
  <div>☰</div>
  <div>Express Logistics</div>
  <div>🔔</div>
</header>

<div class="hero">
  <h1>Track Your Shipment</h1>
  <p>Real-time delivery tracking</p>
</div>

<div class="track-box">
  <input id="trackInput" placeholder="Enter Tracking Number">
  <br>
  <button onclick="track()">Track</button>
</div>

<div id="result" class="status"></div>

<!-- 🔥 FIREBASE SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 TRACK FUNCTION */
function track() {
  const input = document.getElementById("trackInput").value;
  const result = document.getElementById("result");

  if(input === "") {
    alert("Enter tracking number");
    return;
  }

  db.ref("shipments/" + input).once("value")
  .then(snapshot => {
    if(snapshot.exists()) {
      const data = snapshot.val();

      result.style.display = "block";
      result.innerHTML = `
        <h3>Tracking ID: ${input}</h3>
        <p>Status: ${data.status}</p>
        <p>Location: ${data.location}</p>
        <p>ETA: ${data.eta}</p>
      `;
    } else {
      result.style.display = "block";
      result.innerHTML = `<p>Tracking not found</p>`;
    }
  });
}
</script>

</body>
</html>
