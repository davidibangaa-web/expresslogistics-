<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 30px;
}
input, button {
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
button {
  background: green;
  color: white;
}
</style>
</head>

<body>

<h1>🔐 Admin Panel</h1>

<input id="id" placeholder="Tracking ID"><br>
<input id="status" placeholder="Status"><br>
<input id="location" placeholder="Location"><br>
<input id="date" placeholder="Date"><br>

<button onclick="create()">Create Shipment</button>
<button onclick="updateData()">Add Update</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDCCeOgVmgMbF2KS2HF68",
  authDomain: "express-logistics-793a0.firebaseapp.com",
  databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com",
  projectId: "express-logistics-793a0"
});

const db = getDatabase(app);

window.create = function() {
  const id = document.getElementById("id").value;
  const status = document.getElementById("status").value;

  set(ref(db, "shipments/" + id), { status });
  document.getElementById("msg").innerHTML = "✅ Created";
};

window.updateData = function() {
  const id = document.getElementById("id").value;
  const status = document.getElementById("status").value;
  const location = document.getElementById("location").value;
  const date = document.getElementById("date").value;

  const shipmentRef = ref(db, "shipments/" + id + "/history");

  get(shipmentRef).then(snapshot => {
    let count = snapshot.exists() ? Object.keys(snapshot.val()).length + 1 : 1;

    update(ref(db, "shipments/" + id), { status });

    set(ref(db, "shipments/" + id + "/history/" + count), {
      location, status, date
    });

    document.getElementById("msg").innerHTML = "✅ Updated";
  });
};
</script>

</body>
</html>
