<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Express Logistics</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
    }

    .hero {
      margin-top: 60px;
    }

    input {
      padding: 12px;
      width: 250px;
      border-radius: 8px;
      border: none;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
  🚚 Express Logistics
</header>

<div class="hero">
  <h1>Track Your Package</h1>

  <input id="trackingInput" placeholder="Enter Tracking ID">
  <button onclick="trackPackage()">Track</button>

  <p id="result"></p>
</div>

<!-- FIREBASE + TRACKING SYSTEM -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCCeOgVmgMbF2KS2HF68",
    authDomain: "express-logistics-793a0.firebaseapp.com",
    databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com/",
    projectId: "express-logistics-793a0",
    storageBucket: "express-logistics-793a0.appspot.com",
    messagingSenderId: "405295804716",
    appId: "1:405295804716:web:2ee889cab"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.trackPackage = function () {
    const id = document.getElementById("trackingInput").value;
    const shipmentRef = ref(db, "tracking/" + id);

    get(shipmentRef).then((snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        document.getElementById("result").innerHTML =
          "📦 Status: " + data.status + "<br>📍 Location: " + data.location;
      } else {
        document.getElementById("result").innerHTML =
          "❌ Tracking ID not found";
      }
    });
  };
</script>

</body>
</html>
