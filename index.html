<!DOCTYPE html>
<html>
<head>
  <title>Express Logistics</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #0a0f2c, #1c2b4a);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
    }

    input {
      padding: 15px;
      width: 60%;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
    }

    button {
      padding: 15px 25px;
      background: #4CAF50;
      border: none;
      border-radius: 10px;
      color: white;
      margin-left: 10px;
      cursor: pointer;
    }

    /* TIMELINE STYLE */
    .timeline {
      max-width: 600px;
      margin: 40px auto;
      position: relative;
      padding-left: 30px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      width: 3px;
      height: 100%;
      background: #2e3a59;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 30px;
    }

    .timeline-dot {
      position: absolute;
      left: -2px;
      width: 14px;
      height: 14px;
      background: #4CAF50;
      border-radius: 50%;
      top: 5px;
    }

    .timeline-content {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }

    .timeline-content h3 {
      margin: 0;
      color: #4CAF50;
    }

    .timeline-content p {
      margin: 5px 0;
      color: #ccc;
    }
  </style>
</head>

<body>

  <h1>🚚 Express Logistics</h1>
  <h2>Track Your Package in Real-Time</h2>

  <input type="text" id="trackingInput" placeholder="Enter Tracking ID">
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "PASTE_API_KEY",
      authDomain: "PASTE_AUTH_DOMAIN",
      databaseURL: "PASTE_DATABASE_URL",
      projectId: "PASTE_PROJECT_ID",
      storageBucket: "PASTE_STORAGE_BUCKET",
      messagingSenderId: "PASTE_SENDER_ID",
      appId: "PASTE_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.track = function () {
      const id = document.getElementById("trackingInput").value;

      const shipmentRef = ref(db, "shipments/" + id);

      get(shipmentRef).then((snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          const history = data.history;

          let html = `<div class="timeline">`;

          Object.values(history).reverse().forEach(item => {
            html += `
              <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                  <h3>${item.status}</h3>
                  <p>${item.location}</p>
                  <p>${item.date}</p>
                </div>
              </div>
            `;
          });

          html += `</div>`;

          document.getElementById("result").innerHTML = html;

        } else {
          document.getElementById("result").innerHTML =
            "<p style='color:red;'>Tracking ID not found</p>";
        }
      });
    };
  </script>

</body>
</html>
