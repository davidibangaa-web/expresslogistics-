<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Logistics</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b132b, #1c2541);
  color: white;
  text-align: center;
}

.container {
  padding: 60px 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

h2 {
  opacity: 0.8;
  margin-bottom: 30px;
}

.input-box {
  display: flex;
  justify-content: center;
  gap: 10px;
}

input {
  padding: 15px;
  width: 60%;
  max-width: 320px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 15px 25px;
  background: linear-gradient(45deg, #28a745, #3ddc84);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

#result {
  margin-top: 20px;
  font-size: 18px;
}

.timeline {
  max-width: 500px;
  margin: 30px auto;
  text-align: left;
}

.event {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  border-left: 4px solid #3ddc84;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.loader {
  margin-top: 20px;
  display: none;
}

.loader div {
  width: 10px;
  height: 10px;
  margin: 3px;
  background: white;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  to { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div class="container">
  <h1>🚚 Express Logistics</h1>
  <h2>Track Your Package in Real-Time</h2>

  <div class="input-box">
    <input id="trackId" placeholder="Enter Tracking ID">
    <button onclick="track()">Track</button>
  </div>

  <div class="loader" id="loader">
    <div></div><div></div><div></div>
  </div>

  <div id="result"></div>
  <div id="timeline" class="timeline"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCCeOgVmgMbF2KS2HF68",
  authDomain: "express-logistics-793a0.firebaseapp.com",
  databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com",
  projectId: "express-logistics-793a0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.track = function () {
  const id = document.getElementById("trackId").value;
  const shipmentRef = ref(db, "shipments/" + id);

  const loader = document.getElementById("loader");
  const result = document.getElementById("result");
  const timeline = document.getElementById("timeline");

  loader.style.display = "block";
  result.innerHTML = "";
  timeline.innerHTML = "";

  setTimeout(() => {
    get(shipmentRef).then(snapshot => {
      loader.style.display = "none";

      if (snapshot.exists()) {
        const data = snapshot.val();
        result.innerHTML = "✅ " + data.status;

        if (data.history) {
          Object.values(data.history).forEach(item => {
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = `
              <strong>${item.location}</strong><br>
              ${item.status}<br>
              <small>${item.date}</small>
            `;
            timeline.appendChild(div);
          });
        }

      } else {
        result.innerHTML = "❌ Tracking ID not found";
      }
    });
  }, 800);
};
</script>

</body>
</html>
