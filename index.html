<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Logistics PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b132b;
  color: white;
}

.container {
  padding: 20px;
  text-align: center;
}

input, button {
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: green;
  color: white;
  cursor: pointer;
}

.timeline {
  max-width: 500px;
  margin: auto;
  margin-top: 20px;
  text-align: left;
}

.event {
  background: #1c2541;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.admin {
  margin-top: 40px;
  background: #111;
  padding: 20px;
}

h2 {
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚚 Express Logistics</h1>

<!-- USER TRACKING -->
<h2>Track Package</h2>
<input id="trackId" placeholder="Tracking ID">
<button onclick="track()">Track</button>

<div id="result"></div>
<div id="timeline" class="timeline"></div>

<!-- ADMIN PANEL -->
<div class="admin">
<h2>Admin Panel</h2>

<input id="adminId" placeholder="Tracking ID (e.g ABC123)">
<input id="adminStatus" placeholder="Status (In transit)">
<input id="adminLocation" placeholder="Location">
<input id="adminDate" placeholder="Date">

<button onclick="addShipment()">Create Shipment</button>
<button onclick="addUpdate()">Add Update</button>

<div id="adminMsg"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCCeOgVmgMbF2KS2HF68",
  authDomain: "express-logistics-793a0.firebaseapp.com",
  databaseURL: "https://express-logistics-793a0-default-rtdb.firebaseio.com",
  projectId: "express-logistics-793a0",
  storageBucket: "express-logistics-793a0.appspot.com",
  messagingSenderId: "405295804716",
  appId: "1:405295804716:web:2ee889cab",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// TRACK
window.track = function () {
  const id = document.getElementById("trackId").value;
  const shipmentRef = ref(db, "shipments/" + id);

  get(shipmentRef).then(snapshot => {
    const result = document.getElementById("result");
    const timeline = document.getElementById("timeline");
    timeline.innerHTML = "";

    if (snapshot.exists()) {
      const data = snapshot.val();
      result.innerHTML = "✅ " + data.status;

      if (data.history) {
        Object.values(data.history).forEach(item => {
          const div = document.createElement("div");
          div.className = "event";
          div.innerHTML = `${item.location}<br>${item.status}<br><small>${item.date}</small>`;
          timeline.appendChild(div);
        });
      }
    } else {
      result.innerHTML = "❌ Not found";
    }
  });
};

// CREATE SHIPMENT
window.addShipment = function () {
  const id = document.getElementById("adminId").value;
  const status = document.getElementById("adminStatus").value;

  set(ref(db, "shipments/" + id), {
    status: status
  });

  document.getElementById("adminMsg").innerHTML = "✅ Shipment Created";
};

// ADD UPDATE
window.addUpdate = function () {
  const id = document.getElementById("adminId").value;
  const location = document.getElementById("adminLocation").value;
  const status = document.getElementById("adminStatus").value;
  const date = document.getElementById("adminDate").value;

  const newUpdate = {
    location: location,
    status: status,
    date: date
  };

  const shipmentRef = ref(db, "shipments/" + id + "/history");

  get(shipmentRef).then(snapshot => {
    let count = snapshot.exists() ? Object.keys(snapshot.val()).length + 1 : 1;

    update(ref(db, "shipments/" + id), {
      status: status
    });

    set(ref(db, "shipments/" + id + "/history/" + count), newUpdate);

    document.getElementById("adminMsg").innerHTML = "✅ Update Added";
  });
};
</script>

</body>
</html>
